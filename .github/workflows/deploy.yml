name: Deploy Backend PHP al VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar llave SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Enviar archivos al VPS e iniciar servidor
        env:
          SSH_HOST: ${{ secrets.SERVER_IP }}
          SSH_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -Eeuo pipefail

          # 1. Crear la carpeta para tu API PHP en el VPS si no existe
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "mkdir -p /var/www/sgp_backend"

          # 2. Sincronizar tus archivos PHP locales directo a esa carpeta
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" --exclude '.git*' ./ $SSH_USER@$SSH_HOST:/var/www/sgp_backend/

          # 3. Encender o reiniciar el servidor embebido de PHP en el puerto 8083
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "bash -s" << 'EOF'
            set -Eeuo pipefail
            
            # Si el puerto 8083 ya está ocupado por una ejecución vieja, la cierra
            fuser -k 8083/tcp || true
            
            # Levanta el backend apuntando a tu nueva carpeta
            nohup php -S 0.0.0.0:8083 -t /var/www/sgp_backend/ > /dev/null 2>&1 &
          EOF